# ===== SERVIDOR =====
server.port=8080

# ===== BASE DE DATOS =====
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# ===== POOL DE CONEXIONES (HikariCP) =====
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# ===== JPA / HIBERNATE =====
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=false

# ===== ARCHIVOS ADJUNTOS =====
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=75MB

# ===== STORAGE (Cloud) =====
storage.location=${STORAGE_LOCATION}

# ===== LOGS =====
logging.level.org.springframework=INFO
logging.level.com.mesapartes=DEBUG

# ===== JWT =====
jwt.secret=${JWT_SECRET}
jwt.expiration=${JWT_EXPIRATION_MS:3600000}

# ===== EMAIL =====
spring.mail.host=smtp.gmail.com
spring.mail.port=465
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.ssl.enable=true
spring.mail.properties.mail.smtp.starttls.enable=false
spring.mail.properties.mail.smtp.starttls.required=false
spring.mail.properties.mail.smtp.ssl.trust=smtp.gmail.com
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:4200}
spring.jackson.serialization.write-dates-as-timestamps=false

# Timeouts para evitar cuelgues en red lenta
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

mail.from=${MAIL_FROM}

# Habilitar explícitamente (aunque es true por defecto, evita ambigüedad)
springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true

# Ruta de la UI
springdoc.swagger-ui.path=/swagger-ui.html

# Escanear solo los paquetes del proyecto (evita errores con librerías externas)
springdoc.packages-to-scan=com.mesapartes.sgd.controller

# Resolver correctamente objetos planos sin @RequestBody en parámetros
springdoc.default-flat-param-object=true

# Ordenar endpoints por método HTTP (GET, POST, PATCH, DELETE...)
springdoc.swagger-ui.operations-sorter=method

# Mostrar los modelos (DTOs) expandidos en la UI
springdoc.swagger-ui.default-models-expand-depth=1


